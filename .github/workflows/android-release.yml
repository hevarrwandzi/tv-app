name: Android Release Artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to create or update, for example v1.0.0'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Build release APK and AAB
        run: ./gradlew assembleRelease bundleRelease

      - name: Rename release outputs for publishing
        run: |
          cp app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/tv-app-release-unsigned.apk
          cp app/build/outputs/bundle/release/app-release.aab app/build/outputs/bundle/release/tv-app-release.aab

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tv-app-release-unsigned-apk
          path: app/build/outputs/apk/release/tv-app-release-unsigned.apk
          if-no-files-found: error

      - name: Upload release AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: tv-app-release-aab
          path: app/build/outputs/bundle/release/tv-app-release.aab
          if-no-files-found: error

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/tv-app-release-unsigned.apk
            app/build/outputs/bundle/release/tv-app-release.aab
